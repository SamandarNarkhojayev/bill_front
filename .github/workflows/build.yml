name: Build & Release

on:
  push:
    tags:
      - 'v*'        # Запускается при пуше тега v1.0.0, v1.2.3 и т.д.
  workflow_dispatch:  # Ручной запуск из интерфейса GitHub

jobs:
  # ─────────────────────────────────────────
  # Windows — .exe установщик
  # ─────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: release/*.exe
          retention-days: 30

  # ─────────────────────────────────────────
  # macOS — .dmg (Intel + Apple Silicon)
  # ─────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: release/*.dmg
          retention-days: 30

  # ─────────────────────────────────────────
  # Linux — .AppImage + .deb
  # ─────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 libusb-1.0-0-dev

      - name: Install dependencies
        run: npm ci

      - name: Build Linux
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            release/*.AppImage
            release/*.deb
          retention-days: 30

  # ─────────────────────────────────────────
  # Создать GitHub Release со всеми файлами
  # ─────────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: artifacts/macos

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: artifacts/linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Бильярдный Клуб ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: |
            artifacts/windows/*.exe
            artifacts/macos/*.dmg
            artifacts/linux/*.AppImage
            artifacts/linux/*.deb
          body: |
            ## Бильярдный Клуб ${{ github.ref_name }}

            ### Скачать
            | Платформа | Файл |
            |-----------|------|
            | 🪟 Windows | `*Setup*.exe` |
            | 🍎 macOS Intel | `*-1.0.0.dmg` |
            | 🍎 macOS Apple Silicon | `*arm64.dmg` |
            | 🐧 Linux | `*.AppImage` или `*.deb` |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
