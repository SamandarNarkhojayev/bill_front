name: Build & Release

on:
  push:
    tags:
      - 'v*'        # Запускается при пуше тега v1.0.0, v1.2.3 и т.д.
  workflow_dispatch:  # Ручной запуск из интерфейса GitHub

permissions:
  contents: write
  packages: write

jobs:
  # ─────────────────────────────────────────
  # Windows — .exe установщик
  # ─────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        run: npm run dist:win -- --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release/*.exe
            release/*.yml
            release/*.blockmap
          retention-days: 30

  # ─────────────────────────────────────────
  # Создать GitHub Release со всеми файлами
  # ─────────────────────────────────────────
  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows

      - name: Create or update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          TITLE="Бильярдный Клуб ${GITHUB_REF_NAME}"

          printf '%s\n' \
            "## Бильярдный Клуб ${GITHUB_REF_NAME}" \
            "" \
            "### Скачать" \
            "| Платформа | Файл |" \
            "|-----------|------|" \
            '| 🪟 Windows | `*Setup*.exe` |' \
            > release-notes.md

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TITLE" --notes-file release-notes.md
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TITLE" --notes-file release-notes.md
          fi

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          echo "=== Artifacts ==="
          find artifacts -type f | head -50
          echo "================="

          find artifacts -maxdepth 2 -type f \( \
            -name '*.exe' -o \
            -name '*.yml' -o \
            -name '*.blockmap' \
          \) -print0 | while IFS= read -r -d '' file; do
            gh release upload "$TAG" "$file" --repo "$GITHUB_REPOSITORY" --clobber
          done
